<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Samsung Countdown | México vs Sudáfrica 2026</title>
    <style>
        @font-face {
            font-family: "Avant";
            src: url('./fonts/avant.otf');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: "Avant", sans-serif;
            overflow: hidden;
            background-color: black;
        }

        :root {
            --screen-width: 100vw;
            --screen-height: 100vh;
            
            --countdown-prefix-size: calc(var(--screen-height) * 0.07);
            --countdown-text-1-size: calc(var(--screen-height) * 0.32);
            --countdown-text-2-size: calc(var(--screen-height) * 0.18);
            
            --team-name-size: calc(var(--screen-height) * 0.055);
            --vs-size: calc(var(--screen-height) * 0.06);
        }

        #main-container {
            width: var(--screen-width);
            height: var(--screen-height);
            position: relative;
            overflow: hidden;
        }
        
        .bg-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        .header-stack {
            position: absolute;
            z-index: 2;
            width: auto;
        }

        /* ===================== REGULAR LAYOUT (width ≤ 768) ===================== */
        .regular-layout .bg-media {
            object-fit: cover;
        }
        
        .regular-layout .header-stack {
            right: 5%;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            width: auto;
            max-width: 55%;
        }
        
        .regular-layout .target-date-wrapper {
            text-align: center;
            margin-bottom: 1rem;
            width: 80%;
        }
        
        .regular-layout #target-date-text {
            font-size: calc(var(--screen-height) * 0.07);
            font-weight: bold;
            color: black;
            display: inline-block;
        }
        
        .regular-layout .teams-stack {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            margin-bottom: 2rem;
        }
        
        .regular-layout .teams-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        
        .regular-layout .team-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }
        
        .regular-layout .team-name {
            font-size: var(--team-name-size);
            font-weight: bold;
            color: black;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }
        
        .regular-layout .flag {
            width: calc(var(--screen-width) * 0.16);
            height: auto;
            object-fit: contain;
        }
        
        .regular-layout .vs-container {
            font-size: var(--vs-size);
            font-weight: bold;
            color: black;
            text-shadow: 1px 1px 0 #000;
            margin: 0 0.2rem;
        }
        
        .regular-layout .countdown-wrapper {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            margin-top: 0.5rem;
        }
        
        .regular-layout #countdown-container {
            border-radius: 60px;
            display: inline-flex;
        }
        
        .regular-layout #countdown-item {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 0.6rem;
            white-space: nowrap;
        }
        
        .regular-layout #countdown-prefix {
            font-size: var(--countdown-prefix-size);
            font-weight: bold;
            color: white;
        }
        
        .regular-layout #countdown-text-1 {
            font-size: var(--countdown-text-1-size);
            font-weight: bold;
            color: white;
            line-height: 1;
        }
        
        .regular-layout #countdown-text-2 {
            font-size: var(--countdown-text-2-size);
            font-weight: bold;
            color: white;
            padding-left: 5px;
        }
        
        /* ===================== ICONIC LAYOUT (width > 768) ===================== */
        .iconic-layout .header-stack {
            top: 40%;
            left: 45%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .iconic-layout .target-date-wrapper {
            margin-bottom: 0;
        }
        
        .iconic-layout #target-date-text {
            font-size: calc(var(--screen-height) * 0.055);
            font-weight: bold;
            color: black;
            letter-spacing: 1px;
        }
        
        .iconic-layout .teams-stack {
            margin: 0;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        
        .iconic-layout .teams-container {
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        
        .iconic-layout .team-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }
        
        .iconic-layout .team-name {
            font-size: calc(var(--screen-height) * 0.07);
            font-weight: bold;
            color: black;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        
        .iconic-layout .flag {
            width: calc(var(--screen-width) * 0.16);
            height: auto;
            object-fit: contain;
        }
        
        .iconic-layout .vs-container {
            font-size: calc(var(--screen-height) * 0.09);
            font-weight: bold;
            color: black;
            text-shadow: 2px 2px 0 #3a1f00;
            margin: 0 0.3rem;
        }
        
        .iconic-layout .countdown-wrapper {
            margin-top: 1.5rem;
        }
        
        .iconic-layout #countdown-container {
            display: inline-block;
        }
        
        .iconic-layout #countdown-item {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 0.8rem;
        }
        
        .iconic-layout #countdown-prefix {
            font-size: calc(var(--screen-height) * 0.07);
            font-weight: bold;
            color: white;
        }
        
        .iconic-layout #countdown-text-1 {
            font-size: calc(var(--screen-height) * 0.22);
            font-weight: bold;
            color: white;
            line-height: 1;
        }
        
        .iconic-layout #countdown-text-2 {
            font-size: calc(var(--screen-height) * 0.1);
            font-weight: bold;
            color: white;
            padding-left: 8px;
        }
        
        .flag {
            display: block;
            width: auto;
            max-width: 260px;
            height: auto;
            max-height: 180px;
            object-fit: contain;
        }
        
        .team-name, .vs-container span {
            white-space: nowrap;
        }

        .target-date-text, .team-name, .vs-container {
            color: black;
        }
    </style>
</head>
<body>
<div id="main-container">
    <div id="bg-media-container"></div>
    
    <div class="header-stack">
        <div class="target-date-wrapper">
            <span id="target-date-text"></span>
        </div>
        
        <div class="teams-stack">
            <div class="teams-container">
                <div class="team-container">
                    <span class="team-name">México</span>
                    <img class="flag" src="./media/flags/m.png" alt="Bandera México" onerror="this.src='https://placehold.co/100x60?text=MX'">
                </div>
                <div class="vs-container">
                    <span>VS</span>
                </div>
                <div class="team-container">
                    <span class="team-name">Sudáfrica</span>
                    <img class="flag" src="./media/flags/sa.png" alt="Bandera Sudáfrica" onerror="this.src='https://placehold.co/100x60?text=SA'">
                </div>
            </div>
        </div>
        
        <div class="countdown-wrapper">
            <div id="countdown-container">
                <div id="countdown-item">
                    <span id="countdown-prefix"></span>
                    <span id="countdown-text-1"></span>
                    <span id="countdown-text-2"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // Simple rule: if viewport width > 768 pixels, use iconic layout
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        
        const root = document.documentElement;
        root.style.setProperty('--screen-width', viewportWidth + 'px');
        root.style.setProperty('--screen-height', viewportHeight + 'px');
        
        const isIconic = viewportWidth > 768;
        
        if (isIconic) {
            document.body.classList.add('iconic-layout');
            document.body.classList.remove('regular-layout');
        } else {
            document.body.classList.add('regular-layout');
            document.body.classList.remove('iconic-layout');
        }
        
        // --- BACKGROUND HANDLING ---
        const bgContainer = document.getElementById('bg-media-container');
        bgContainer.innerHTML = '';
        
        if (isIconic) {
            const video = document.createElement('video');
            video.className = 'bg-media';
            video.autoplay = true;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            video.setAttribute('playsinline', '');
            video.style.objectFit = 'cover';
            video.style.width = '100%';
            video.style.height = '100%';
            
            const source = document.createElement('source');
            source.src = './media/iconic/display.mp4';
            source.type = 'video/mp4';
            video.appendChild(source);
            
            video.onerror = function() {
                console.warn('Iconic video failed to load, using fallback');
                video.style.display = 'none';
                const fallbackDiv = document.createElement('div');
                fallbackDiv.className = 'bg-media';
                fallbackDiv.style.backgroundColor = '#1a0a2e';
                bgContainer.appendChild(fallbackDiv);
            };
            
            video.addEventListener('canplaythrough', () => {
                video.play().catch(e => console.log('Video autoplay prevented:', e));
            });
            video.play().catch(e => console.log('Autoplay blocked'));
            bgContainer.appendChild(video);
        } else {
            const img = document.createElement('img');
            img.className = 'bg-media';
            img.src = './media/regular/display.png';
            img.alt = 'background';
            img.style.objectFit = 'cover';
            img.style.width = '100%';
            img.style.height = '100%';
            img.onerror = () => {
                img.style.display = 'none';
                const fallbackDiv = document.createElement('div');
                fallbackDiv.className = 'bg-media';
                fallbackDiv.style.backgroundColor = '#0a1a2f';
                bgContainer.appendChild(fallbackDiv);
            };
            bgContainer.appendChild(img);
        }
        
        // ---- COUNTDOWN LOGIC ----
        const targetDate = new Date('2026-06-11T14:00:00-05:00');
        const targetDateEl = document.getElementById('target-date-text');
        targetDateEl.innerText = targetDate.toLocaleDateString('es-MX', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        
        const now = new Date();
        let remainingDays = Math.ceil((targetDate - now) / (1000 * 60 * 60 * 24));
        if (remainingDays < 0) remainingDays = 0;
        
        const prefixSpan = document.getElementById('countdown-prefix');
        const daysNumSpan = document.getElementById('countdown-text-1');
        const unitSpan = document.getElementById('countdown-text-2');
        
        prefixSpan.innerText = remainingDays === 1 ? 'Falta' : 'Faltan';
        daysNumSpan.innerText = remainingDays.toString().padStart(2, '0');
        unitSpan.innerText = remainingDays === 1 ? 'día' : 'días';
        
        if (remainingDays === 0) {
            prefixSpan.innerText = 'Hoy';
            daysNumSpan.innerText = '00';
            unitSpan.innerText = '';
        }
        
        // Fix flag aspect ratio
        const allFlags = document.querySelectorAll('.flag');
        allFlags.forEach(flag => {
            flag.style.width = '';
            flag.style.height = '';
            flag.addEventListener('load', function() {
                this.style.width = '';
                this.style.height = '';
            });
        });
        
        // Ensure iconic video plays
        if (isIconic) {
            const videoElement = document.querySelector('#bg-media-container video');
            if (videoElement) {
                const forcePlay = () => {
                    if (videoElement.paused) {
                        videoElement.play().catch(e => console.log('playback retry:', e));
                    }
                };
                videoElement.addEventListener('loadeddata', forcePlay);
                setTimeout(forcePlay, 500);
                const playOnInteraction = () => {
                    if (videoElement && videoElement.paused) {
                        videoElement.play().then(() => {
                            document.removeEventListener('click', playOnInteraction);
                            document.removeEventListener('touchstart', playOnInteraction);
                        }).catch(e => {});
                    } else {
                        document.removeEventListener('click', playOnInteraction);
                        document.removeEventListener('touchstart', playOnInteraction);
                    }
                };
                document.addEventListener('click', playOnInteraction);
                document.addEventListener('touchstart', playOnInteraction);
            }
        }
        
        // Remove any blur
        const allBlurElements = document.querySelectorAll('.teams-container, #countdown-container, .target-date-wrapper span');
        allBlurElements.forEach(el => {
            el.style.backdropFilter = 'none';
            el.style.filter = 'none';
        });
        
        const vsSpan = document.querySelector('.vs-container span');
        if (vsSpan) vsSpan.style.whiteSpace = 'nowrap';
        
        // Small screen adjustments
        const adjustForSmall = () => {
            if (!isIconic && viewportWidth < 500) {
                const teamNames = document.querySelectorAll('.team-name');
                teamNames.forEach(tn => tn.style.fontSize = '14px');
                const flags = document.querySelectorAll('.flag');
                flags.forEach(f => f.style.maxWidth = '40px');
                const vsCont = document.querySelector('.vs-container');
                if (vsCont) vsCont.style.fontSize = '18px';
                const countdownContainer = document.getElementById('countdown-container');
                if (countdownContainer) countdownContainer.style.padding = '0.3rem 1rem';
            }
        };
        adjustForSmall();
        
        // Ensure background fills
        const resizeObserver = new ResizeObserver(() => {
            const bgMedia = document.querySelector('.bg-media');
            if (bgMedia) {
                bgMedia.style.width = '100%';
                bgMedia.style.height = '100%';
                bgMedia.style.objectFit = 'cover';
            }
            if (isIconic) {
                const videoBg = document.querySelector('#bg-media-container video');
                if (videoBg && videoBg.paused && !videoBg.ended) {
                    videoBg.play().catch(e => {});
                }
            }
        });
        resizeObserver.observe(document.body);
    })();
</script>
</body>
</html>
